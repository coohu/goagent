server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "60s"

agent:
  max_concurrent_sessions: 10
  default_max_steps: 30
  default_max_runtime: "10m"
  default_max_llm_calls: 30
  default_max_tool_calls: 20
  default_max_replan: 5
  default_max_tokens: 200000
  worker_pool_size: 20

llm:
  default_model: "qwen/qwen3.6-plus:free"
  summarizer_model: "qwen/qwen3.6-plus:free"
  reflection_model: "qwen/qwen3.6-plus:free"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    timeout: "120s"
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5:32b"

embedding:
  endpoint: "http://localhost:8001"
  dimensions: 512
  batch_size: 32

reranker:
  endpoint: "http://localhost:8002"
  top_k_input: 20
  top_k_output: 5

memory:
  tool_memory_max_raw_size: 50000
  conversation_ttl: "24h"
  session_cache_ttl: "1h"

event_bus:
  queue_capacity: 1000
  max_replan_per_min: 3
  max_tool_retry_per_min: 2
  debounce_memory_update: "2s"
  debounce_context_build: "5s"
  dedup_window: "30s"
  loop_detection_threshold: 3

tools:
  shell:
    sandbox_image: "goagent-sandbox:latest"
    cpu_limit: "1.0"
    memory_limit: "512m"
    command_timeout: "60s"
    session_timeout: "10m"
    workspace_root: "/tmp/goagent/workspaces"
  search:
    provider: "tavily"
    tavily_api_key: "${TAVILY_API_KEY}"
    max_results: 5

database:
  postgres:
    dsn: "${POSTGRES_DSN}"
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"
  redis:
    addr: "${REDIS_ADDR}"
    password: ""
    db: 0
  qdrant:
    addr: "${QDRANT_ADDR}"
    port: 6334

log:
  level: "info"
  format: "json"
